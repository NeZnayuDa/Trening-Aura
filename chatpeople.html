<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>TRENING AURA | Chat & Friends</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Manrope', sans-serif; background: #0e0e0e; color: #fff; height: 100vh; overflow: hidden; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; font-family: 'Material Symbols Outlined'; font-size: 24px; line-height: 1; display: inline-block; }

        /* NAV */
        nav { position: fixed; top: 0; width: 100%; z-index: 50; background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .nav-inner { display: flex; justify-content: space-between; align-items: center; padding: 12px 24px; max-width: 1400px; margin: 0 auto; }
        .nav-logo { font-size: 20px; font-weight: 900; font-style: italic; color: #cafd00; text-decoration: none; letter-spacing: -0.05em; font-family: 'Space Grotesk', sans-serif; }
        .nav-actions { display: flex; align-items: center; gap: 16px; }
        .nav-btn { background: none; border: none; cursor: pointer; color: #adaaaa; display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 700; text-decoration: none; transition: color 0.15s; }
        .nav-btn:hover { color: #fff; }

        /* LAYOUT */
        .layout { display: flex; height: 100vh; padding-top: 57px; }

        /* SIDEBAR */
        .sidebar { width: 340px; flex-shrink: 0; border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; background: #0a0a0a; }
        .tabs { display: flex; border-bottom: 1px solid rgba(255,255,255,0.05); padding: 0 16px; }
        .tab-btn { flex: 1; padding: 14px 0; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.15em; color: #adaaaa; background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; transition: all 0.15s; position: relative; }
        .tab-btn.active { color: #cafd00; border-bottom-color: #cafd00; }
        .tab-panel { display: none; flex: 1; overflow-y: auto; }
        .tab-panel.active { display: block; }
        .tab-panel::-webkit-scrollbar { width: 3px; }
        .tab-panel::-webkit-scrollbar-thumb { background: #262626; border-radius: 3px; }

        /* FRIEND ITEMS */
        .friend-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; cursor: pointer; transition: background 0.15s; border-left: 3px solid transparent; }
        .friend-item:hover { background: #131313; }
        .friend-item.active { background: #131313; border-left-color: #cafd00; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #262626; display: flex; align-items: center; justify-content: center; font-weight: 900; color: #cafd00; font-size: 16px; flex-shrink: 0; font-family: 'Space Grotesk', sans-serif; }
        .avatar.lg { width: 44px; height: 44px; font-size: 18px; }
        .online-dot { width: 10px; height: 10px; background: #22c55e; border-radius: 50%; border: 2px solid #0a0a0a; position: absolute; bottom: -1px; right: -1px; }
        .badge { background: #cafd00; color: #3a4a00; font-size: 9px; font-weight: 900; min-width: 16px; height: 16px; border-radius: 8px; display: flex; align-items: center; justify-content: center; padding: 0 3px; }
        .req-badge { position: absolute; top: 6px; right: 6px; }

        /* SEARCH */
        .search-wrap { padding: 16px; }
        .search-box { position: relative; }
        .search-box .material-symbols-outlined { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #adaaaa; font-size: 20px; }
        .search-input { width: 100%; background: #1a1a1a; border: 1px solid rgba(255,255,255,0.08); color: #fff; padding: 11px 12px 11px 40px; border-radius: 12px; font-size: 14px; outline: none; font-family: 'Manrope', sans-serif; transition: border-color 0.15s; }
        .search-input:focus { border-color: rgba(202,253,0,0.4); }
        .search-input::placeholder { color: rgba(173,170,170,0.4); }
        #searchResults { margin-top: 12px; }

        /* USER CARD */
        .user-card { display: flex; align-items: center; gap: 12px; padding: 12px; background: #1a1a1a; border-radius: 12px; margin-bottom: 8px; }
        .user-info { flex: 1; min-width: 0; }
        .user-name { font-weight: 700; font-size: 14px; }
        .user-email { font-size: 12px; color: #adaaaa; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .btn-add { background: #cafd00; color: #3a4a00; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; padding: 7px 14px; border-radius: 20px; border: none; cursor: pointer; white-space: nowrap; transition: transform 0.1s; }
        .btn-add:hover { transform: scale(1.05); }
        .btn-friends { background: rgba(202,253,0,0.1); color: #cafd00; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; padding: 7px 14px; border-radius: 20px; border: none; white-space: nowrap; }
        .btn-pending { background: rgba(255,255,255,0.05); color: #adaaaa; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; padding: 7px 14px; border-radius: 20px; border: none; white-space: nowrap; }

        /* CHAT PANEL */
        .chat-panel { flex: 1; display: flex; flex-direction: column; background: #0e0e0e; }
        .chat-header { display: flex; align-items: center; gap: 16px; padding: 14px 24px; border-bottom: 1px solid rgba(255,255,255,0.05); background: #0a0a0a; flex-shrink: 0; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 12px; }
        .chat-messages::-webkit-scrollbar { width: 3px; }
        .chat-messages::-webkit-scrollbar-thumb { background: #262626; border-radius: 3px; }
        .chat-input-area { padding: 14px 24px; border-top: 1px solid rgba(255,255,255,0.05); background: #0a0a0a; flex-shrink: 0; display: flex; gap: 12px; align-items: center; }
        .msg-input { flex: 1; background: #1a1a1a; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 12px 16px; font-size: 14px; color: #fff; outline: none; font-family: 'Manrope', sans-serif; transition: border-color 0.15s; }
        .msg-input:focus { border-color: rgba(202,253,0,0.4); }
        .msg-input::placeholder { color: rgba(173,170,170,0.4); }
        .send-btn { width: 46px; height: 46px; background: #cafd00; color: #3a4a00; border-radius: 12px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: transform 0.1s; }
        .send-btn:hover { transform: scale(1.05); }
        .send-btn:active { transform: scale(0.95); }

        /* MESSAGES */
        .msg-row { display: flex; align-items: flex-end; gap: 8px; }
        .msg-row.me { justify-content: flex-end; }
        .msg-row.them { justify-content: flex-start; }
        .msg-avatar { width: 26px; height: 26px; border-radius: 50%; background: #262626; display: flex; align-items: center; justify-content: center; color: #cafd00; font-weight: 900; font-size: 11px; flex-shrink: 0; }
        .msg-bubble { padding: 10px 14px; font-size: 14px; line-height: 1.5; word-break: break-word; max-width: 70%; }
        .msg-bubble.me { background: #cafd00; color: #3a4a00; border-radius: 18px 18px 4px 18px; font-weight: 600; }
        .msg-bubble.them { background: #1a1a1a; color: #fff; border-radius: 18px 18px 18px 4px; }
        .msg-time { font-size: 10px; color: rgba(173,170,170,0.4); margin-top: 3px; }

        /* EMPTY STATE */
        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; padding: 32px; }
        .empty-state .material-symbols-outlined { font-size: 56px; color: rgba(173,170,170,0.15); margin-bottom: 12px; }
        .empty-state p { color: #adaaaa; font-size: 14px; line-height: 1.6; }

        /* REQUEST ITEMS */
        .req-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.04); }
        .req-actions { display: flex; gap: 8px; margin-left: auto; }
        .req-btn { width: 32px; height: 32px; border-radius: 8px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .req-btn.accept { background: #cafd00; color: #3a4a00; }
        .req-btn.decline { background: rgba(185,41,2,0.2); color: #ff7351; }

        /* SECTION LABEL */
        .section-label { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.2em; color: #adaaaa; padding: 14px 16px 8px; }

        /* LOADING */
        .loading { display: flex; align-items: center; justify-content: center; padding: 24px; color: #adaaaa; font-size: 13px; gap: 8px; }

        /* NO CHAT SELECTED (desktop) */
        .no-chat { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .no-chat .material-symbols-outlined { font-size: 80px; color: rgba(173,170,170,0.08); margin-bottom: 16px; }
        .no-chat h2 { font-size: 20px; font-weight: 900; color: rgba(255,255,255,0.15); text-transform: uppercase; letter-spacing: -0.02em; font-family: 'Space Grotesk', sans-serif; }
        .no-chat p { color: rgba(173,170,170,0.3); font-size: 13px; margin-top: 8px; }

        /* MOBILE */
        @media (max-width: 768px) {
            .sidebar { width: 100%; position: absolute; top: 57px; left: 0; right: 0; bottom: 0; z-index: 10; }
            .sidebar.hidden { display: none; }
            .chat-panel { position: absolute; top: 57px; left: 0; right: 0; bottom: 0; z-index: 10; display: none; }
            .chat-panel.open { display: flex; }
            .no-chat { display: none; }
            .back-btn { display: flex !important; }
        }
        .back-btn { display: none; }

        /* TOAST */
        .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); z-index: 9999; padding: 12px 24px; border-radius: 12px; font-weight: 700; font-size: 14px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); white-space: nowrap; animation: toastIn 0.3s ease; }
        @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    </style>
</head>
<body>

<!-- Firebase SDKs (compat mode) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="./firebase-config.js"></script>
<script src="./auth.js"></script>

<!-- NAV -->
<nav>
    <div class="nav-inner">
        <a href="./index.html" class="nav-logo">TRENING AURA</a>
        <div class="nav-actions">
            <a href="./profil.html" class="nav-btn">
                <span class="material-symbols-outlined" style="font-size:20px;">person</span>
                <span id="navUserName"></span>
            </a>
            <button onclick="doLogout()" class="nav-btn" title="Logout">
                <span class="material-symbols-outlined" style="font-size:20px;">logout</span>
            </button>
        </div>
    </div>
</nav>

<!-- LAYOUT -->
<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <!-- TABS -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('friends')" id="tab-friends">Friends</button>
            <button class="tab-btn" onclick="switchTab('search')" id="tab-search">Find People</button>
            <button class="tab-btn" onclick="switchTab('requests')" id="tab-requests" style="position:relative;">
                Requests
                <span class="badge req-badge" id="reqBadge" style="display:none;">0</span>
            </button>
        </div>

        <!-- FRIENDS PANEL -->
        <div class="tab-panel active" id="panel-friends">
            <div class="section-label">Your Friends</div>
            <div id="friendsList">
                <div class="loading"><span class="material-symbols-outlined" style="font-size:18px; animation:spin 1s linear infinite;">refresh</span> Loading...</div>
            </div>
        </div>

        <!-- SEARCH PANEL -->
        <div class="tab-panel" id="panel-search">
            <div class="search-wrap">
                <div class="search-box">
                    <span class="material-symbols-outlined">search</span>
                    <input class="search-input" id="searchInput" type="text" placeholder="Search by name or email..." oninput="onSearchInput(this.value)" />
                </div>
                <div id="searchResults">
                    <div class="empty-state" style="padding-top:32px;">
                        <span class="material-symbols-outlined">person_search</span>
                        <p>Type to search for users</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- REQUESTS PANEL -->
        <div class="tab-panel" id="panel-requests">
            <div class="section-label">Incoming Requests</div>
            <div id="requestsList">
                <div class="loading"><span class="material-symbols-outlined" style="font-size:18px; animation:spin 1s linear infinite;">refresh</span> Loading...</div>
            </div>
        </div>
    </div>

    <!-- CHAT PANEL -->
    <div class="chat-panel" id="chatPanel">
        <!-- Header -->
        <div class="chat-header">
            <button class="back-btn nav-btn" onclick="closeChatPanel()">
                <span class="material-symbols-outlined">arrow_back</span>
            </button>
            <div class="avatar lg" id="chatAvatar">?</div>
            <div style="flex:1;">
                <div style="font-weight:700; font-size:15px;" id="chatName">—</div>
                <div style="font-size:12px; color:#adaaaa;" id="chatStatus">—</div>
            </div>
            <button onclick="removeFriendConfirm()" class="nav-btn" title="Remove friend">
                <span class="material-symbols-outlined" style="font-size:20px;">person_remove</span>
            </button>
        </div>

        <!-- Messages -->
        <div class="chat-messages" id="chatMessages">
            <div class="empty-state">
                <span class="material-symbols-outlined">chat_bubble</span>
                <p>Select a friend to start chatting</p>
            </div>
        </div>

        <!-- Input -->
        <div class="chat-input-area">
            <input class="msg-input" id="msgInput" type="text" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendMessage()" />
            <button class="send-btn" onclick="sendMessage()">
                <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1;">send</span>
            </button>
        </div>
    </div>

    <!-- NO CHAT SELECTED (desktop) -->
    <div class="no-chat" id="noChatSelected">
        <span class="material-symbols-outlined">forum</span>
        <h2>Select a conversation</h2>
        <p>Choose a friend from the left to start chatting</p>
    </div>
</div>

<style>
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
</style>

<!-- ================= TRENING AURA CHAT FIXED ================= -->
<script>
let currentUser = null;
let activeFriendId = null;
let activeChatId = null;
let chatRef = null;
let chatHandler = null;
let searchTimeout = null;

// ───────────────── INIT ─────────────────
document.addEventListener('DOMContentLoaded', async function () {
    currentUser = AuraAuth.getCurrentUser();

    if (!currentUser) {
        window.location.href = './login.html';
        return;
    }

    document.getElementById('navUserName').textContent = currentUser.name;

    await renderFriends();
    await renderRequests();
});

function doLogout() {
    AuraAuth.logout();
    window.location.href = './index.html';
}

// ───────────────── TABS ─────────────────
function switchTab(tab) {
    ['friends', 'search', 'requests'].forEach(t => {
        document.getElementById('panel-' + t).classList.remove('active');
        document.getElementById('tab-' + t).classList.remove('active');
    });

    document.getElementById('panel-' + tab).classList.add('active');
    document.getElementById('tab-' + tab).classList.add('active');

    if (tab === 'search') {
        setTimeout(() => document.getElementById('searchInput').focus(), 50);
    }
}

// ───────────────── FRIENDS ─────────────────
async function renderFriends() {
    const list = document.getElementById('friendsList');
    const friends = await AuraAuth.getFriends();

    if (!friends.length) {
        list.innerHTML = `
        <div class="empty-state">
            <span class="material-symbols-outlined">group</span>
            <p>No friends yet</p>
        </div>`;
        return;
    }

    list.innerHTML = friends.map(f => `
        <div class="friend-item ${activeFriendId === f.uid ? 'active' : ''}"
             onclick="openChat('${f.uid}', '${escapeHtml(f.name)}', '${escapeHtml(f.email)}')">
            <div class="avatar">${f.name.charAt(0).toUpperCase()}</div>
            <div style="flex:1; min-width:0;">
                <div style="font-weight:700;">${escapeHtml(f.name)}</div>
                <div style="font-size:12px;color:#aaa;" id="last-${f.uid}">...</div>
            </div>
        </div>
    `).join('');

    friends.forEach(loadLastMessage);
}

function loadLastMessage(friendUid) {
    const chatId = AuraChat.getChatId(currentUser.uid, friendUid);

    AuraAuth.db.ref(`chats/${chatId}/messages`)
        .orderByChild('time')
        .limitToLast(1)
        .once('value', snap => {

            const el = document.getElementById('last-' + friendUid);
            if (!el) return;

            if (!snap.exists()) {
                el.textContent = 'No messages';
                return;
            }

            let last = null;
            snap.forEach(m => last = m.val());

            if (!last) return;

            el.textContent =
                (last.senderId === currentUser.uid ? 'You: ' : '') +
                last.text;
        });
}

// ───────────────── SEARCH ─────────────────
function onSearchInput(val) {
    clearTimeout(searchTimeout);

    if (!val.trim()) {
        document.getElementById('searchResults').innerHTML =
            `<div class="empty-state"><p>Type to search</p></div>`;
        return;
    }

    searchTimeout = setTimeout(() => doSearch(val), 300);
}

async function doSearch(query) {
    const results = document.getElementById('searchResults');

    const users = await AuraAuth.searchUsers(query);
    const friends = await AuraAuth.getFriends();
    const sent = await AuraAuth.getSentRequests();

    const friendIds = friends.map(f => f.uid);

    if (!users.length) {
        results.innerHTML = `<div class="empty-state"><p>No users found</p></div>`;
        return;
    }

    results.innerHTML = users.map(u => {

        const isFriend = friendIds.includes(u.uid);
        const isSent = sent.includes(u.uid);

        let btn = '';

        if (isFriend) {
            btn = `<span class="btn-friends">Friends</span>`;
        } else if (isSent) {
            btn = `<span class="btn-pending">Sent</span>`;
        } else {
            btn = `<button class="btn-add" onclick="sendFriendRequest('${u.uid}')">Add</button>`;
        }

        return `
        <div class="user-card">
            <div class="avatar">${u.name.charAt(0)}</div>
            <div style="flex:1;">
                <div>${escapeHtml(u.name)}</div>
                <div style="font-size:12px;color:#aaa">${escapeHtml(u.email)}</div>
            </div>
            ${btn}
        </div>`;
    }).join('');
}

async function sendFriendRequest(uid) {
    const r = await AuraAuth.sendFriendRequest(uid);

    if (r.success) {
        showToast('Request sent');
        doSearch(document.getElementById('searchInput').value);
    } else {
        showToast(r.error, true);
    }
}

// ───────────────── REQUESTS ─────────────────
async function renderRequests() {
    const list = document.getElementById('requestsList');
    const reqs = await AuraAuth.getFriendRequests();

    const badge = document.getElementById('reqBadge');

    if (reqs.length) {
        badge.style.display = 'flex';
        badge.textContent = reqs.length;
    } else {
        badge.style.display = 'none';
    }

    if (!reqs.length) {
        list.innerHTML = `<div class="empty-state"><p>No requests</p></div>`;
        return;
    }

    list.innerHTML = reqs.map(r => `
        <div class="req-item">
            <div class="avatar">${r.name.charAt(0)}</div>
            <div style="flex:1;">
                <div>${escapeHtml(r.name)}</div>
                <div style="font-size:12px;color:#aaa">${escapeHtml(r.email)}</div>
            </div>
            <button onclick="acceptRequest('${r.uid}')">✔</button>
            <button onclick="declineRequest('${r.uid}')">✖</button>
        </div>
    `).join('');
}

async function acceptRequest(uid) {
    await AuraAuth.acceptFriendRequest(uid);
    await renderRequests();
    await renderFriends();
    showToast('Added!');
}

async function declineRequest(uid) {
    await AuraAuth.declineFriendRequest(uid);
    await renderRequests();
}

// ───────────────── CHAT ─────────────────
function openChat(uid, name, email) {

    if (chatRef) chatRef.off();

    activeFriendId = uid;
    activeChatId = AuraChat.getChatId(currentUser.uid, uid);

    document.getElementById('chatName').textContent = name;
    document.getElementById('chatStatus').textContent = email;

    // ❌ НЕ скрываем sidebar
    // document.getElementById('sidebar').style.display = 'none';

    // ✅ просто добавляем режим "chat open"
    document.querySelector('.layout').classList.add('chat-open');

    document.getElementById('chatPanel').classList.add('open');
    document.getElementById('noChatSelected').style.display = 'none';

    const container = document.getElementById('chatMessages');
    container.innerHTML = `<div class="loading">Loading...</div>`;

    chatRef = AuraAuth.db.ref(`chats/${activeChatId}/messages`);

    chatRef.off();

    chatRef.on('child_added', snap => {
        addMessageToUI(snap.val());
    });
}
function addMessageToUI(m) {
    const box = document.getElementById('chatMessages');

    const isMe = m.senderId === currentUser.uid;

    const div = document.createElement('div');
    div.style.textAlign = isMe ? 'right' : 'left';

    div.innerHTML = `
        <div class="msg-bubble ${isMe ? 'me' : 'them'}">
            ${escapeHtml(m.text)}
        </div>
    `;

    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

function closeChatPanel() {
    if (chatRef) chatRef.off();

    activeFriendId = null;
    activeChatId = null;

    document.getElementById('sidebar').style.display = 'flex';
    document.getElementById('chatPanel').classList.remove('open');
}

function renderMessages(msgs) {
    const box = document.getElementById('chatMessages');

    if (!msgs.length) {
        box.innerHTML = `<div class="empty-state"><p>Say hi 👋</p></div>`;
        return;
    }

    box.innerHTML = msgs.map(m => `
        <div style="text-align:${m.senderId === currentUser.uid ? 'right' : 'left'}">
            <div class="msg-bubble ${m.senderId === currentUser.uid ? 'me' : 'them'}">
                ${escapeHtml(m.text)}
            </div>
        </div>
    `).join('');

    box.scrollTop = box.scrollHeight;
}

async function sendMessage() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();

    if (!text || !activeFriendId) return;

    input.value = '';

    await AuraChat.sendMessage(activeFriendId, text);

    await chatRef.push({
    senderId: current.uid,
    text,
    time: Date.now(),
    delivered: true,
    read: false
});
}

// ───────────────── HELPERS ─────────────────
function escapeHtml(t) {
    return (t || '').replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;');
}

function showToast(msg, err = false) {
    const t = document.createElement('div');
    t.className = 'toast';
    t.style.background = err ? '#b92902' : '#cafd00';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2500);
}
</script>
