<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maxsulot Qo'shish</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="product-container">
        <div class="product-box">
            <h1>Maxsulot Qo'shish</h1>
            <form id="product-form">
                <input type="text" id="product-name" placeholder="Maxsulot Nomi" class="product-input" required>
                <input type="text" id="product-price" placeholder="Maxsulot Narxi" class="product-input" required>
                <input type="text" id="product-image" placeholder="Maxsulot Rasmi" class="product-input" required>
                <textarea id="product-desc" placeholder="Maxsulot haqida ma'lumot" class="product-textarea" required></textarea>
                <button type="submit" class="product-btn">Maxsulot qo'shish</button>
            </form>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
